server:
  port: 8083

spring:
  application:
    name: notification-service

  datasource:
    url: jdbc:postgresql://localhost:5432/sifamo_onboarding
    username: notif_app
    password: notif_password

  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        default_schema: notification_schema
    open-in-view: false

  kafka:
    bootstrap-servers: localhost:9092
    consumer:
      group-id: notification-service-v2
      auto-offset-reset: latest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.ErrorHandlingDeserializer
      properties:
        spring.deserializer.value.delegate.class: org.springframework.kafka.support.serializer.JsonDeserializer
        spring.json.value.default.type: com.sifamo.notification.domain.event.OrderEvent
        spring.json.use.type.headers: false
        spring.json.trusted.packages: "com.sifamo.notification.domain.event,java.util,java.time"

app:
  kafka:
    order-events-topic: order-events