openapi: 3.0.3

info:
  title: Customer Service API
  version: 1.0.0

paths:
  /customers:
    get:
      summary: List all customers
      responses:
        '200':
          description: A list of customers
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Customer'

    post:
      summary: Create a new customer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateCustomerRequest'
      responses:
        '201':
          description: Customer created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Customer'
        '400':
          description: Invalid request body

  /customers/{id}:
    get:
      summary: Get customer details
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Customer details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Customer'
        '404':
          description: Customer not found

  /customers/{id}/shipping-addresses:
    get:
      summary: List shipping addresses of a customer
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: A list of customer shipping addresses
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ShippingAddress'
        '404':
          description: Customer not found

    post:
      summary: Add shipping address to customer
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateShippingAddressRequest'
      responses:
        '201':
          description: Shipping address created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ShippingAddress'
        '400':
          description: Invalid request body
        '404':
          description: Customer not found
  /customers/{id}/shipping-addresses/{shippingAddressId}:
    get:
      summary: Verify a specific shipping address for a customer
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: shippingAddressId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Shipping address exists for this customer
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ShippingAddress'
        '404':
          description: Shipping address not found or does not belong to this customer

components:
  schemas:
    Customer:
      type: object
      required:
        - id
        - firstName
        - lastName
        - email
        - billingAddress
      properties:
        id:
          type: string
          format: uuid
        firstName:
          type: string
        lastName:
          type: string
        email:
          type: string
          format: email
        billingAddress:
          $ref: '#/components/schemas/BillingAddress'

    CreateCustomerRequest:
      type: object
      required:
        - firstName
        - lastName
        - email
        - billingAddress
      properties:
        firstName:
          type: string
          minLength: 1
        lastName:
          type: string
          minLength: 1
        email:
          type: string
          format: email
        billingAddress:
          $ref: '#/components/schemas/CreateBillingAddressRequest'

    BillingAddress:
      type: object
      required:
        - id
        - street
        - city
        - postalCode
        - country
      properties:
        id:
          type: string
          format: uuid
        street:
          type: string
        city:
          type: string
        postalCode:
          type: string
        country:
          type: string

    CreateBillingAddressRequest:
      type: object
      required:
        - street
        - city
        - postalCode
        - country
      properties:
        street:
          type: string
          minLength: 1
        city:
          type: string
          minLength: 1
        postalCode:
          type: string
          minLength: 1
        country:
          type: string
          minLength: 2
          maxLength: 2

    ShippingAddress:
      type: object
      required:
        - id
        - street
        - city
        - postalCode
        - country
      properties:
        id:
          type: string
          format: uuid
        street:
          type: string
        city:
          type: string
        postalCode:
          type: string
        country:
          type: string

    CreateShippingAddressRequest:
      type: object
      required:
        - street
        - city
        - postalCode
        - country
      properties:
        street:
          type: string
          minLength: 1
        city:
          type: string
          minLength: 1
        postalCode:
          type: string
          minLength: 1
        country:
          type: string
          minLength: 2
          maxLength: 2